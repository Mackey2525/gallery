<script>

function openTab(event,tabName){

let contents=document.querySelectorAll(".tabContent");
let buttons=document.querySelectorAll(".tabButton");

contents.forEach(c=>c.classList.remove("active"));
buttons.forEach(b=>b.classList.remove("active"));

document.getElementById(tabName).classList.add("active");

event.target.classList.add("active");

/* 背景変更 */
document.body.classList.remove("prosupi","pawapuro");
document.body.classList.add(tabName);

/* タブ保存 */
localStorage.setItem("selectedTab",tabName);

}


/* ページ読み込み時復元 */

window.addEventListener("DOMContentLoaded",function(){

let savedTab=localStorage.getItem("selectedTab");

if(savedTab){

let btn=document.querySelector(`button[onclick*="${savedTab}"]`);

if(btn){
openTab({target:btn},savedTab);
}

}

});

</script>
